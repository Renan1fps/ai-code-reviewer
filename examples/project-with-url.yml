# Exemplo 3: Projeto que usa URL genérica (Notion export, Gitbook, etc.)
# Copie este arquivo para: .github/workflows/code-review.yml

name: AI Code Review

on:
  issue_comment:
    types: [created]

jobs:
  review:
    if: |
      github.event.issue.pull_request != null &&
      contains(github.event.comment.body, '@codeReviewer')
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: AI Code Review
        uses: seu-org/ai-code-reviewer@v1
        with:
          llm_provider: gemini
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}

          # URL pública com o style guide (Notion, Gitbook, GitHub raw, etc.)
          style_guide_url: 'https://raw.githubusercontent.com/seu-org/docs/main/style-guide.md'

          # Skills customizadas dentro do próprio repo
          skills_path: './engineering/review-skills'
